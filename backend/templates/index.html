<!DOCTYPE html>
<html>

<head>
    <title>Used Car Price Prediction</title>
</head>

<body>

    <h1>🚗 Used Car Price Prediction</h1>

    <form action="/predict" method="POST">

        <label>Brand</label>
        <br>
        <input type="text" name="brand">
        <br><br>

        <label>Model Year</label>
        <br>
        <input type="number" name="model_year">
        <br><br>

        <label>Kilometers Driven</label>
        <br>
        <input type="number" name="km_driven">
        <br><br>

        <button type="submit">
            Predict Price
        </button>

    </form>

</body>

</html>
